      - application/json
      description: Delete a MinIO bucket
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Delete Bucket
      tags:
      - minio
    get:
      consumes:
      - application/json
      description: Check if a MinIO bucket exists
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Check Bucket Exists
      tags:
      - minio
    post:
      consumes:
      - application/json
      description: Create a new MinIO bucket
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create Bucket
      tags:
      - minio
  /v1/minio/buckets/{bucket}/objects:
    get:
      consumes:
      - application/json
      description: List objects in a MinIO bucket
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List Objects
      tags:
      - minio
  /v1/minio/buckets/{bucket}/objects/{object}:
    get:
      consumes:
      - application/json
      description: Download an object from MinIO bucket
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Object name
        in: path
        name: object
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Object
      tags:
      - minio
    put:
      consumes:
      - multipart/form-data
      description: Upload an object to MinIO bucket
      parameters:
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Object name
        in: path
        name: object
        required: true
        type: string
      - description: MinIO configuration JSON
        in: formData
        name: config
        required: true
        type: string
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Put Object
      tags:
      - minio
  /v1/minio/buckets/{bucket}/objects/{object}/presigned-get:
    get:
      consumes:
      - application/json
      description: Generate a presigned URL for downloading an object
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Object name
        in: path
        name: object
        required: true
        type: string
      - description: 'Expiry time in seconds (default: 3600)'
        in: query
        name: expiry
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
