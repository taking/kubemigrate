          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Generate Presigned GET URL
      tags:
      - minio
  /v1/minio/buckets/{bucket}/objects/{object}/presigned-put:
    put:
      consumes:
      - application/json
      description: Generate a presigned URL for uploading an object
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Object name
        in: path
        name: object
        required: true
        type: string
      - description: 'Expiry time in seconds (default: 3600)'
        in: query
        name: expiry
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Generate Presigned PUT URL
      tags:
      - minio
  /v1/minio/buckets/{bucket}/objects/delete:
    delete:
      consumes:
      - application/json
      description: Delete an object from MinIO bucket
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      - description: Object name
        in: path
        name: object
        required: true
        type: string
      produces:
