          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Stat Object
      tags:
      - minio
  /v1/minio/buckets/{srcBucket}/objects/{srcObject}/copy/{dstBucket}/{dstObject}:
    post:
      consumes:
      - application/json
      description: Copy an object within or between MinIO buckets
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Source bucket name
        in: path
        name: srcBucket
        required: true
        type: string
      - description: Source object name
        in: path
        name: srcObject
        required: true
        type: string
      - description: Destination bucket name
        in: path
        name: dstBucket
        required: true
        type: string
      - description: Destination object name
        in: path
        name: dstObject
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Copy Object
      tags:
      - minio
  /v1/minio/buckets/create-if-not-exists:
    post:
      consumes:
      - application/json
      description: Create a MinIO bucket if it doesn't exist
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      - description: Bucket name
        in: path
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create Bucket If Not Exists
      tags:
      - minio
  /v1/minio/health:
    post:
      consumes:
      - application/json
      description: Test MinIO connection with provided configuration
      parameters:
      - description: MinIO configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.MinioConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: MinIO Connection Test
      tags:
      - minio
  /v1/velero/backups:
    post:
      consumes:
      - application/json
      description: Get list of Velero backups
      parameters:
      - description: Velero configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.VeleroConfig'
      - description: 'Namespace name (default: ''velero'', all namespaces: ''all'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
