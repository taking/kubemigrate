basePath: /api
definitions:
  config.KubeConfig:
    properties:
      kubeconfig:
        description: '[필수] Base64 인코딩된 KubeConfig 값'
        example: base64 인코딩된 KubeConfig 값
        type: string
    required:
    - kubeconfig
    type: object
  config.MinioConfig:
    properties:
      accessKey:
        description: '[필수] minio accessKey'
        example: your_minio_accessKey
        type: string
      endpoint:
        description: '[필수] minio endpoint 주소'
        example: 127.0.0.1:9000
        type: string
      secretKey:
        description: '[필수] minio secretKey'
        example: your_minio_secretKey
        type: string
      useSSL:
        description: '[필수] minio useSSL 여부 (false: http / true: https)'
        example: false
        type: boolean
    required:
    - accessKey
    - endpoint
    - secretKey
    type: object
  config.VeleroConfig:
    properties:
      kubeconfig:
        $ref: '#/definitions/config.KubeConfig'
      minio:
        $ref: '#/definitions/config.MinioConfig'
    required:
    - kubeconfig
    - minio
    type: object
  response.ErrorResponse:
    properties:
      code:
        description: '에러 코드 (예: "VALIDATION_FAILED", "CONNECTION_FAILED")'
        type: string
      details:
        description: 상세 에러 정보 (선택적)
        type: string
      message:
        description: 사용자 친화적인 에러 메시지
        type: string
      request_id:
        description: 요청 추적용 ID (선택적)
        type: string
      status:
        description: 항상 "error"
        type: string
      timestamp:
        description: 에러 발생 시각
        type: string
    type: object
  response.SuccessResponse:
    properties:
      data:
        description: 응답 데이터 (선택적)
      message:
        description: 성공 메시지 (선택적)
        type: string
      request_id:
        description: 요청 추적용 ID (선택적)
        type: string
      status:
        description: 항상 "success"
        type: string
      timestamp:
        description: 응답 생성 시각
        type: string
    type: object
info:
  contact:
    email: taking@duck.com
    name: API Support
    url: github.com/taking/kubemigrate/issues
  description: Kubernetes cluster migration and backup validation API with multi-cluster
    support
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: KubeMigrate API Server
  version: "1.0"
paths:
  /v1/helm/charts:
    get:
      consumes:
      - application/json
      description: Get list of all Helm charts
      parameters:
      - description: 'Namespace name (default: ''default'', all namespaces: ''all'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Helm Charts
      tags:
      - helm
    post:
      consumes:
      - application/json
      description: Install Helm chart from URL (supports tgz URLs and versions)
      parameters:
      - description: Kubernetes configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.KubeConfig'
      - description: Release name
        in: query
        name: releaseName
        required: true
        type: string
      - description: Chart URL (must be HTTP/HTTPS)
        in: query
        name: chartURL
        required: true
        type: string
      - description: Chart version (optional)
        in: query
        name: version
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Install Helm Chart
      tags:
      - helm
  /v1/helm/charts/{name}:
    delete:
      consumes:
      - application/json
      description: Uninstall a specific Helm chart
      parameters:
      - description: Chart name
        in: path
        name: name
        required: true
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      - description: 'Dry run mode (default: false)'
        in: query
        name: dryRun
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Uninstall Helm Chart
      tags:
      - helm
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific Helm chart
      parameters:
      - description: Chart name
        in: path
        name: name
        required: true
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Helm Chart Details
      tags:
      - helm
    put:
      consumes:
      - application/json
      description: Upgrade a specific Helm chart
      parameters:
      - description: Chart name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.KubeConfig'
      - description: Chart path or URL
        in: query
        name: chartPath
        required: true
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Upgrade Helm Chart
      tags:
      - helm
  /v1/helm/charts/{name}/history:
    get:
      consumes:
      - application/json
      description: Get installation history of a specific Helm chart
      parameters:
      - description: Chart name
        in: path
        name: name
        required: true
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Chart History
      tags:
      - helm
  /v1/helm/charts/{name}/status:
    get:
      consumes:
      - application/json
      description: Check if a specific Helm chart is installed
      parameters:
      - description: Chart name
        in: path
        name: name
        required: true
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Check Chart Installation Status
      tags:
      - helm
  /v1/helm/charts/{name}/values:
    get:
      consumes:
      - application/json
      description: Get current values of a specific Helm chart
      parameters:
      - description: Chart name
        in: path
        name: name
        required: true
        type: string
      - description: 'Namespace name (default: ''default'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Chart Values
      tags:
      - helm
  /v1/helm/health:
    post:
      consumes:
      - application/json
      description: Test Helm connection with provided configuration
      parameters:
      - description: Kubernetes configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.KubeConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Helm Connection Test
      tags:
      - helm
  /v1/kubernetes/{kind}/{name}:
    get:
      consumes:
      - application/json
      description: Get Kubernetes resources by kind, name (optional) and namespace
      parameters:
      - description: Kubernetes configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.KubeConfig'
      - description: Resource kind (pods, configmaps, secrets, storage-classes)
        in: path
        name: kind
        required: true
        type: string
      - description: Resource name (empty for list, specific name for single resource)
        in: path
        name: name
        type: string
      - description: 'Namespace name (default: ''default'', all namespaces: ''all'')'
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Kubernetes Resources
      tags:
      - kubernetes
  /v1/kubernetes/health:
    post:
      consumes:
      - application/json
      description: Test Kubernetes connection with provided configuration
      parameters:
      - description: Kubernetes configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/config.KubeConfig'
      produces:
